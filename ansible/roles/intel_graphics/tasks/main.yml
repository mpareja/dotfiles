- name: Install compositor to prevent Intel graphics tearing
  become: true
  when: display_server == "xorg"
  apt:
    state: present
    name:
      - regolith-compositor-picom-glx

- name: Install non-free intel media drivers
  become: true
  apt:
    state: present
    name:
      - intel-media-va-driver-non-free
